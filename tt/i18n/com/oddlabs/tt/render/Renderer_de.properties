checksum_error_message=Beim letzten Spiel ist ein Prüfsummenfehler aufgetreten.\n\
			  \n\
			  Wenn Sie auf ''OK'' klicken, wird das Spiel beendet, und Sie werden beim nächsten Starten des Spiels aufgefordert, einen Fehlerbericht zu senden.\n\
			  Wenn Sie auf ''Abbrechen'' klicken, wird das Spiel fortgesetzt, und es wird kein Fehlerbericht gesendet.\n\
			  Es wird jedoch empfohlen, auf ''OK'' zu klicken, da Fehlerberichte bei der Problemanalyse und -behebung hilfreich sind.
