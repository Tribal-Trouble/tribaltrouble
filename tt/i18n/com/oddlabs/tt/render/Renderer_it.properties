checksum_error_message=L''ultima partita ha un rapporto di errore.\n\
			  \n\
			  Cliccando su Ok chiuderai il gioco e al prossimo riavvio ti verrà chiesto di inviare un rapporto di errore.\n\
			  Cliccando Annulla continuerai la corrente sessione di gioco e non invierai alcun rapporto di errore.\n\
			  Cliccare su OK è altamente raccomandato, poichè i rapporti di errore aiuteranno la Oddlabs a localizzare e risolvere il problema rapidamente.
