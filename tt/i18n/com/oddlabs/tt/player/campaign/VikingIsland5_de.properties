description=Gunnar der Gutgläubige versucht die Insel zu erobern, aber er könnte wohl etwas Hilfe beim Plattmachen der Eingeborenensiedlungen gebrauchen. Als Gegenleistung für ein bisschen Unterstützung stellt er vielleicht ein paar seiner Männer ab.
dialog0=OK, diese Hütten machen wir platt! Aber Vorsicht - unsere Freunde sollten wir nicht erwischen!
dialog1=Das glaube ich einfach nicht! Die Eingeborenen haben Speere nach uns geworfen! Wer uns hilft, sie auszulöschen, soll angemessen belohnt werden!
dialog2=Vielen Dank für die Hilfe! Ich werde 5 meiner besten Krieger für die Mission zur Verfügung stellen!
game_over=Gunnars Stamm wurde getötet. Game over.
