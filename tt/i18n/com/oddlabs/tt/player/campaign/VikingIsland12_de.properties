description=Wie lustig ... da sind andere Wikinger, die uns wie verrückt winken. Ob sie unsere Hilfe brauchen?
dialog0=OK, wir helfen euch, Jungs. Wir machen die Eingeborenen platt, dann könnt ihr mit uns kommen - zumindest die, die dann noch übrig sind.
dialog1=Bitte helft uns! Wir konnten uns Egill Eierkopfs Plündergebühr nicht leisten, und so hat er unser Schiff konfisziert und uns hier zurückgelassen. Jetzt haben uns die Eingeborenen entdeckt, und sie scheinen nicht besonders erfreut darüber zu sein, dass wir sie mit unserem Besuch beehren.
game_over=Alle Freunde wurden getötet. Game over.
