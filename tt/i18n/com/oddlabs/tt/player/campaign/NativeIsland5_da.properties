description=Dette er Fjorleifs egen ø, hvor han sandsynligvis gemmer sig nu.
dialog0=Hvad, heller ingen statuer her?!? Lad os udrydde de vikinger og finde ud af, hvad der er sket med vores statuer.
dialog1=Neeej, vis nåde, jeg skal nok fortælle jer, hvad jeg ved! Fjorleif var her i går for at blære sig med sit rov, men han tog afsted mod en eller anden hemmelig ø. Jeg ved ikke, hvor den er, men han sejlede mod vest.
