description=Gunnar sagte was über einen großen und allmächtigen Donnergott, der sich irgendwo auf dieser Insel herumtreiben soll. Naja, so stark wie der Mächtige Xarrr wird er sicherlich nicht sein, aber vielleicht kann er uns doch ein wenig aushelfen, jetzt, da uns die Wummernde Wolke im Stich gelassen hat.
dialog0=Wir sind am Ziel - Zeit für ein kleines Picknick. Wir sollten uns aber beeilen, ich glaube, die Wikinger sind auch schon unterwegs. Oh, und haltet euch von den Türmen fern.
dialog1=Wer wagt es, in mein Reich einzudringen?!?
dialog2=Häuptling Ngumba und seine furchtlosen Krieger!
dialog3=Ihr impertinenten Zwerge! Das werdet ihr bereuen!
dialog4=Ahhhh, Großer Xarrr, beschütze uns!
dialog5=Xarrr? Den kennt ihr? Das ist mein alter Kumpel von der Götterakademie! Netter Kerl!
dialog6=Ähm, klar kennen wir den! Er hat mir beigebracht, das Wetter zu beeinflussen, so dass ich meine Feinde mit heftigen Blitzen niederstrecken kann. Aber irgendwie funktioniert das in diesem kalten Klima nicht.
dialog7=Dann hat er dir bestimmt auch beigebracht, wie man den vorzüglichen Ekligen Eintopf macht, den er früher immer gekocht hat. Ich liebe exotische Speisen, aber meine Frau setzt mir immer dieselben langweiligen Blut- und Leberwürste vor. Koch mir diesen Eintopf, dann helfe ich euch mit eurem Blitzproblem!
dialog8=Kein Problem, Thor, deinen Ekligen Eintopf sollst du haben!
