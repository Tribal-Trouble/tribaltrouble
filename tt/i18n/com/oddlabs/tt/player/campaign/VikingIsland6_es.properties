description=Por razones desconocidas, algunos peones fueron abandonadas en esta isla. Vamos a ver si les podemos ayudar.
dialog0=No te preocupes, ¡les vamos a dar una lección a esos nativos! Despues, puedes unirte a nosotros.
dialog1=¡Maldito Jefe Gunnar y sus estúpidas ideas! Nos pidió que saqueáramos esta isla mientras él visitaba otra, pero nos dejó aquí sin armas y en clara inferioridad numérica con los indígenas. Si nos ayudas, ¡creo que mejor nos pasaremos a tu tribu!
game_over=Todos los aliados han sido asesinados. Fin de la partida.
