description=Das ist Fjorleifs Privatinsel. Wahrscheinlich hält er sich hier gerade versteckt.
dialog0=Was, hier sind auch keine Statuen?!? Diese Wikinger machen wir platt, und dann finden wir heraus, was mit unseren Statuen geschehen ist.
dialog1=Bitte, tut mir nichts, ich sage euch alles, was ich weiß! Fjorleif war gestern hier und hat mächtig mit seiner Beute angegeben, aber dann hat er sich wieder auf irgendeine geheime Insel verzogen. Ich weiß nicht, wo sie ist, aber er ist westwärts gesegelt.
