description=Das Schiff eines unserer Rivalen wurde nahe dieser Insel gesichtet. Vielleicht hat man dort auch vom Schatz der Eingeborenen gehört.
dialog0=Oh nein, mein Erzrivale Egill Eierkopf hat diese Insel erobert! Der ist bestimmt auch hinter dem Schatz der Eingeborenen her. Mist, ich glaube, er hat uns entdeckt!
dialog1=Fjorleif Furzhose, dass wir uns hier treffen!
dialog2=*Grrrhh* ... Nenn mich nicht bei meinem vollen Namen, wenn die Männer dabei sind!
dialog3=Nun ja, ich bin gekommen, um dir mitzuteilen, dass diese Inselgruppe nun Eigentum der Eierkopf Plünder-AG ist, und dass hier nur derjenige das Zutrittsrecht hat, der täglich eine Plündergebühr in Höhe von einem Fass Gold abdrückt. Bist du damit einverstanden?
dialog4=Wie bitte?!? Wir waren ja wohl zuerst hier!
dialog5=Offensichtlich doch nicht! Ich werte das dann als Nein. Meine Krieger werden dafür sorgen, dass ihr auf brutale und relativ unangenehme Weise von dieser Insel befördert werdet. Guten Tag!
dialog6=Diese Ratte ... damit kommt er nicht durch!
dialog7=Furzhose, ja?
dialog8=Maul halten und kämpfen!
