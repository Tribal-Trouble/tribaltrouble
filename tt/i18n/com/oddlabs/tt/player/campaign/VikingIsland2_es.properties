description=Hemos visto un montón de pollos de colores en esa isla. Quizás los indígenas los están alimentando con algún siniestro propósito.
dialog0=Nuestros exploradores nos han informado que los indígenas parecen estar usando esos pollos para construir armas especiales. ¡Debemos derrotarles y averiguar su secreto!
dialog1=Su secreto era usar los picos de los pollos como puntas de lanza. He diseñado un hacha de la misma manera, así que ahora podremos equipar terribles Guerreros Pollo.
