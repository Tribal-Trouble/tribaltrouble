captive=Gefangener
description=Gunnars Insel. Er hat uns gesagt, dass einige unserer Brüder als Leibeigene gehalten werden. Vielleicht sind ja ein paar von ihnen hier. In diesem Fall müssen wir sie sofort befreien!
dialog0=Sieh mal, Häuptling! Gunnar hatte Recht, sie haben einige unserer Brüder verschleppt, wahrscheinlich, um sie als Leibeigene auszubeuten. Zeig ihnen, wie wütend du bist, und setz eine Wummernde Wolke frei!
dialog1=Verdammt! In dieser Kälte funktioniert das nicht. Oder vielleicht haben wir uns einfach zu weit vom Gebiet des Großen Xarrr entfernt. Offenbar müssen wir das auf die althergebrachte Art erledigen ... los geht''s!
dialog2=Nun seid ihr frei, ihr kleinen Kerle, jetzt hat die Schufterei für die Wikinger ein Ende!\n\
			  \n\
			  Jetzt steht hier nicht so rum - macht euch an die Arbeit und baut mir ein Dorf, damit wir eine riesige Armee aufbauen und diese Wikinger schlagen können!
dialog3=*mümpf* *grummel*
dialog4=Was?
dialog5=Äh, ja Chef, geht klar!
