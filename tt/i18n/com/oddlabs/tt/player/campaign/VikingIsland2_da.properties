description=Vi har set en masse farverige kyllinger på denne ø. Måske avler de indfødte dem til et eller andet skummelt formål?
dialog0=Vores spejdere har rapporteret, at de indfødte ser ud til at bruge kyllingerne til et specielt våben. Vi må besejre dem for at lære deres hemmelighed!
dialog1=Deres hemmelighed var at bruge næbene fra kyllingerne til spydhoveder. Jeg har designet en økse på samme måde, så nu kan vi udruste frygtindgydende kyllingekrigere.
