description=Vielleicht ist das die geheime Insel, über die Grimhildur Grützenfresser gesprochen hat, als er sagte, dass Fjorleif mit den Statuen westwärts gesegelt ist.
dialog0=Dünnschiss und Darmamöben! Hier sind auch keine Statuen! Wenigstens haben offenbar einige unserer Landsleute ein Stückchen weiter ihr Lager aufgeschlagen.
dialog1=Seid gepriesen, Häuptling Ngumba! Wir sind eine Gruppe ehemaliger Leibeigener, die in die Freiheit entkommen sind. Dank der Größe der Insel konnten wir uns bisher vor den Wikingern verstecken. Wir schlagen hier unser Lager auf, damit wir ein Schiff bauen und nach Hause segeln können!
dialog2=Wie wäre es denn, wenn wir uns zusammentun und die Wikinger von dieser Insel vertreiben? Ich könnte mir vorstellen, dass euer Schiffsbau um einiges schneller vorankäme, wenn euch die Wikinger nicht immer ablenken würden.
dialog3=Klingt gut ... Auf zum Wikingerknüppeln!
dialog4=Hey, Chef, wir haben eine interessante Karte in den Ruinen gefunden. Sie zeigt eine Insel, von der wir bisher nichts wussten. Ich habe sie mal in unserer Karte eingezeichnet. Vielleicht hat sich Fjorleif ja hier verkrochen?
game_over=Alle Verbündeten wurden getötet. Game over.
