description=Die verborgene Insel, auf deren höchstem Berg der große Donnergott Xarrr lebt. Wenn wir es bis zum Gipfel schaffen, gewährt er uns vielleicht einen Wunsch.
dialog0=Das muss der Berg sein, von dem Häuptling Mozumba gesprochen hat. Wir müssen den Gipfel erreichen, aber ich bin mir nicht so sicher, dass diese Eingeborenen uns so einfach ohne Kampf dorthin lassen. Vielleicht sollten wir einen anderen Weg suchen.
dialog1=Endlich, wir haben den Gipfel erreicht! So, und wo ist nun dieser Donnergott ... ich sehe nur eine kleine, hutzelige Figur!
dialog10=Wenn ihr mich jetzt entschuldigen wollt ... ich muss mich noch um ein paar Unwetter kümmern.
dialog11=Hmm, das könnte das furchtbare Unwetter erklären, aufgrund dessen wir überhaupt hier gestrandet sind. Egal, probieren wir den Destruktiven Donner lieber aus, bevor wir weiter müssen. Am besten jetzt und hier.
dialog2=WAS FÜHRT DICH ZU MIR, STERBLICHER?
dialog3=Ups, die Figur spricht! Äh, ja, also, ... Großer Xarrr, Häuptling Mozumba sagte mir, dass ... äh ... also, wenn wir deinen Berg besteigen, würdest du uns einen ... naja ... also ... einen ... ähem ... Wunsch ... gewähren ...?
dialog4=EINEN WUNSCH?
dialog5=*schluck* Ja, so was in der Art hat er gesagt ...
dialog6=Nun gut, was wünschst du dir, Sterblicher?
dialog7=Ähm ... ich wünsche mir, dass meine Feinde vor mir zu Staub zerfallen!
dialog8=Okidokie, dann sollst du von jetzt an mit deiner Lure einen Destruktiven Donner erzeugen können, der alles und jeden in deiner Nähe zu Staub zerfallen lässt!
dialog9=Cool, danke ... so sagt man doch, oder ... ?
