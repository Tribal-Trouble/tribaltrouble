description=Tuo cugino, Gunnar L''Ingenuo, sta cercando di conquistare quest''isola, ma gli farebbe comodo un po'' di aiuto per distruggere l''accampamento nemico. Se lo aiuti, Gunnar potrebbe lasciarti alcuni dei suoi uomini.
dialog0=Ok, inceneriamo quelle capanne! Mi raccomando, proteggete i nostri alleati.
dialog1=Non posso crederci, i nativi si stanno prendendo gioco di noi! Se ci aiutate a sconfiggerli vi ricompenserò.
dialog2=Grazie per l''aiuto! Manderò 5 dei miei migliori uomini per aiutarti nella tua ricerca.
game_over=La tribù di Gunnar è stata eliminata. Game over.
