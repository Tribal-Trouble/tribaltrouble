description=Qué divertido... aquí hay otros Vikingos agitando sus brazos frenéticamente hacia nuestro barco. ¿Quizás necesiten nuestra ayuda?
dialog0=De acuerdo, vamos a ayudaros tíos. Vamos a barrer a esos nativos, después el resto de vosotros os vendréis con nosotros. 
dialog1=¡Por favor, ayuda! No podemos pagar las licencias de saqueo de Cagill Cabezahuevo, así que nos requisaron el barco y nos dejaron aquí tirados. Ahora los indígenas nos han visto, y parece que no están muy contentos de tenernos como vecinos.
game_over=Todos los amigos fueron asesinados. Fin de la partida.
