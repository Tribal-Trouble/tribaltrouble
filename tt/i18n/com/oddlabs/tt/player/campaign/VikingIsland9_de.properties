description=Bei den Eingeborenen erzählt man sich, auf der Insel gebe es einen sehr alten und weisen Häuptling. Vielleicht gibt er ja ein paar nützliche Informationen preis, wenn wir ihn erwischen.
dialog0=Wie erwartet ist der Häuptling hervorragend geschützt. Schalten Sie seine Krieger aus, und setzen Sie ihn für die Befragung fest.
dialog1=Bitte, tut mir nichts! Ich sage alles, was ich weiß ... Ein ganzes Stück südwestlich von hier gibt es eine Insel, die auf keiner Karte zu finden ist. Demjenigen, der den Berg darauf bezwingt, gewährt der große Donnergott Xarr einen Wunsch - vorausgesetzt, man bittet ihn recht nett.
game_over=Der feindliche Häuptling wurde besiegt. Game over.
