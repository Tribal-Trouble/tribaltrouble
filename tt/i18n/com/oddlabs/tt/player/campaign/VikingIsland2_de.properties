description=Wir haben eine Menge bunter Hühnchen auf dieser Insel gesehen. Ob die Eingeborenen sie für irgendwelche mysteriösen Zwecke züchten?
dialog0=Unsere Kundschafter haben berichtet, dass die Eingeborenen die Hühnchen offenbar zur Herstellung besonderer Waffen verwenden. Wir müssen sie besiegen und ihr Geheimnis lüften!
