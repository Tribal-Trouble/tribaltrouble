description=Aus unerfindlichen Gründen wurden einige Knechte auf dieser Insel zurückgelassen. Vielleicht können wir sie ja retten.
dialog0=Keine Sorge, wir werden diesen Wilden eine Lektion erteilen! Danach können wir uns zusammentun.
dialog1=Verflucht noch eins! Dieser verdammte Gunnar und seine idiotischen Ideen. Er hat uns befohlen, diese Insel zu plündern, während er eine andere unter die Fittiche nahm. Aber jetzt hat er uns hier ohne Waffen zurückgelassen, und noch dazu sind wir den Eingeborenen zahlenmäßig absolut unterlegen. Wenn ihr uns helft, werden wir zu euch überlaufen.
game_over=Alle Verbündeten wurden getötet. Game over.
