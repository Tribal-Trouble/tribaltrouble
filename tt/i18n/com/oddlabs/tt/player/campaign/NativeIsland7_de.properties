description=Das muss Fjorleifs geheimes Versteck sein. Zweifellos hat er die Statuen hier versteckt.
dialog0=So, so ... wen haben wir denn da? Wenn das nicht der ehrenwerte Häuptling Ngumba ist! Diese hässlichen Statuen müssen euch ja schon sehr am Herzen liegen, wenn ihr dafür den langen Weg in den hohen Norden auf euch genommen habt.
dialog1=Mehr als du glaubst, Fjorleif ... Ich glaube, es ist an der Zeit, dass du lernst, was passieren kann, wenn man anderer Leute Goldstatuen klaut!
