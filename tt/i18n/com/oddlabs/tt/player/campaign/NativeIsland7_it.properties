description=Questo dev''essere il nascondiglio di Fjorleif. Senza dubbio ha nascosto le statue qui.
dialog0=Bene bene... guarda chi si vede. Il famoso Capo Ngumba! Devi avere molto a cuore le tue statue per venire fino a qui per riprenderle.
dialog1=Più di quello che pensi, Fjorleif... Credo sia giunto il momento di insegnarti che non è molto carino rubare le statue d''oro altrui!
