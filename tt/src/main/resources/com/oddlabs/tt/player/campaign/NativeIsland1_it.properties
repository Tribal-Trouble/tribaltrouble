description=L''isola di Gunnar. Sappiamo che alcuni dei nostri sono stati presi come schiavi, forse alcuni di loro sono qui. Se \u00E8 cos\u00EC, dobbiamo liberarli!

header0=Zimfubo Lo Zelante
dialog0=Guarda capo! Gunnar diceva la verit\u00E0, hanno preso alcuni dei nostri e li hanno fatti schiavi. Mostragli la tua ira e libera il potere della Nuvola Crepitante!

header1=Capo Ngumba
dialog1=Dannazione! Non funziona con questo clima freddo! Forse siamo troppo lontani dai domini del Grande Xarrr. Sembra che dovremo sbrigarcela alla vecchia maniera... andiamo!

header2=Capo Ngumba
dialog2=Ora siete liberi amici, la schiavit\u00F9 Vichinga \u00E8 finita!\n\nBene, non restate l\u00EC impalati - cominciate a costruire un villaggio, dobbiamo formare una grande armata per poter sconfiggere questi Vichinghi!

