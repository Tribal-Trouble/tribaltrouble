tip0=Atacar unidades enemigas desde un terreno elevado dar\u00E1 a tus guerreros una ventaja t\u00E1ctica
tip1=Almacena una selecci\u00F3n pulsando control + 0-9 y recupera dicha selecci\u00F3n pulsando s\u00F3lo el n\u00FAmero memorizado
tip2=Haz zoom a una selecci\u00F3n almacenada pulsando su n\u00FAmero dos veces seguidas
tip3=Selecciona todas las unidades del mismo tipo, dentro de pantalla, haciendo doble click en una de ellas
tip4=Acerca y aleja el zoom moviendo la rueda del rat\u00F3n o pulsando Av P\u00E1g o Re P\u00E1g
tip5=Cuantas m\u00E1s unidades tengas en la armer\u00EDa, m\u00E1s r\u00E1pidamente podr\u00E1n producir armas
tip6=Cuando est\u00E9s asignando unidades, haz click derecho sobre los iconos + y - para cambiar el n\u00FAmero de 10 en 10
tip7=Lleva las unidades seleccionadas a un edificio haciendo click derecho en \u00E9l
tip8=Cuantas m\u00E1s unidades tengas en el barrac\u00F3n, mas r\u00E1pidamente podr\u00E1n producir peones
tip9=Cuantas m\u00E1s unidades tengas en el barrac\u00F3n, m\u00E1s r\u00E1pidamente podr\u00E1n producir un jefe tribal
tip10=Los peones pueden derribar torres m\u00E1s r\u00E1pidamente que los guerreros
tip11=Mover unidades haciendo que ataquen un punto del suelo har\u00E1 que ataquen cualquier enemigo avistado
tip12=Pulsa espacio o el 5 del teclado num\u00E9rico para entrar en el Modo Mapa
tip13=Pasa el cursor por encima de unidades y edificios para ver su estado
tip14=Las unidades y edificios de miembros de tu equipo se ver\u00E1n con un c\u00EDrculo azul al ser seleccionados
tip15=Despl\u00E1zate por el mapa llevando el rat\u00F3n a los extremos de la pantalla o con los cursores
tip16=Rota la vista pulsando 4 o 6 del teclado num\u00E9rico o con Insert y Supr
tip17=Dirige hacia donde quieres que salgan tus unidades del barrac\u00F3n poniendo un Punto de reuni\u00F3n
tip18=Mira hacia arriba y abajo pulsando 2 y 8 del teclado num\u00E9rico o con Inicio y Fin
tip19=Las armas hechas con pollo tropical pueden rebotar y golpear varias veces al enemigo
tip20=En el Modo Mapa, tus edificios y unidades est\u00E1n resaltados con tu color de jugador
tip21=Haz un r\u00E1pido zoom a otra parte de la isla, cambiando a Modo Mapa y pulsando en el sitio elegido
tip22=Selecciona varias unidades dejando pulsado Control mientras haces click en ellas
tip23=Selecciona varias unidades trazando un rect\u00E1ngulo con el rat\u00F3n en la zona donde est\u00E9n
tip24=Para construir nuevos edificios r\u00E1pidamente, usa la funci\u00F3n Transporte para enviar unos peones con madera
tip25=Las torres son muy adecuadas para defender edificios, peones o pasos estrechos.
tip26=Construye barracones extra para generar peones m\u00E1s r\u00E1pidamente
tip27=Construir las armer\u00EDas cerca de los recursos naturales permite que los peones recolecten recursos mas r\u00E1pidamente
tip28=Para seguir construyendo un tipo de arma indefinidamente, aumenta la producci\u00F3n hasta ver un s\u00EDmbolo de infinito
tip29=Cambia la velocidad del juego pulsando + o - en el teclado num\u00E9rico
tip30=Cuando est\u00E9s jugando, pulsa Enter para enviar mensajes a todos y May\u00FAsculas + Enter para enviar s\u00F3lo a tu equipo
tip31=Cuando una flecha roja, verde o azul parpadee, pulsa el Tabulador para ir r\u00E1pidamente a la zona
tip32=Cuando las unidades han sido aturdidas por el Lur Liante, son m\u00E1s f\u00E1ciles de golpear
tip33=El Rugido Rompedor produce m\u00E1s da\u00F1o en distancias cortas
tip34=Una unidad recibir\u00E1 da\u00F1os del Puchero P\u00FAtrido mientras siga respirando sus humos
tip35=Las unidades amigas est\u00E1n acostumbradas al Puchero P\u00FAtrido, as\u00ED que son m\u00E1s resistentes a su efecto
tip36=La Nube Neutrina puede usarse para atacar a enemigos que se esconden en campamentos fortificados
tip37=Pulsa Control + b y haz click en el suelo para colocar una se\u00F1al que alerte a tu equipo
tip38=Pulsa N para ciclar entre los peones que no est\u00E1n haciendo nada.
