# This workflow will build a Java project with Ant
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-ant

name: Build + Publish

on:
  push:
    branches: [ "new_main" ]
  pull_request:
    branches: [ "new_main" ]
  workflow_dispatch:

jobs:
  format-check:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Check Format
      run: ant -noinput -buildfile build.xml format-check

  build-linux:

    runs-on: ubuntu-latest
    needs: format-check

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Ant
      run: ant -noinput -buildfile tt/build.xml build-linux
    - name: Upload Linux AppImage
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: tt/build/dist/linux/TribalTrouble-x86_64.AppImage
    - name: Upload Linux Package
      uses: actions/upload-artifact@v4
      with:
        name: linux-package
        path: tt/build/dist/linux/TribalTrouble.AppDir

  build-windows:
  
    runs-on: windows-latest
    needs: format-check

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Ant
      run: ant -noinput -buildfile tt/build.xml build-windows
    - name: Upload files
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: tt/build/dist/windows/
    
  build-mac-x86:
  
    runs-on: macos-15-intel
    needs: format-check

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build mac binaries
      run: ant -noinput -buildfile tt/build.xml build-mac-x86
    - name: Upload files
      uses: actions/upload-artifact@v4
      with:
        name: mac-x86
        path: tt/build/dist/macosx-x86/

  build-mac-arm64:
  
    runs-on: macos-latest
    needs: format-check

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build mac binaries
      run: ant -noinput -buildfile tt/build.xml build-mac-arm64
    - name: Upload files
      uses: actions/upload-artifact@v4
      with:
        name: mac-arm64
        path: tt/build/dist/macosx-arm64/

# Only build and upload mac x86 as an app image when deploying to steam. 
# We would need to sign it to always use this type. Steam handles it for us.
  build-mac-x86-app:
    if: github.ref == 'refs/heads/steam'
    runs-on: macos-15-intel
    needs: format-check

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build mac binaries
      run: ant -noinput -buildfile tt/build.xml build-mac-x86-app
    - name: Upload files
      uses: actions/upload-artifact@v4
      with:
        name: mac-x86-app
        path: tt/build/dist/macosx-x86-app/
    

# Steam upload job:
#  - https://github.com/game-ci/steam-deploy#configuration
#  - https://partner.steamgames.com/doc/sdk/uploading#1
  deploy-to-steam:
    if: github.ref == 'refs/heads/steam'
    needs: [build-mac-arm64, build-mac-x86-app, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: tt/build/dist/windows/
    - name: Download Mac x86 Artifact
      uses: actions/download-artifact@v4
      with:
        name: mac-x86-app
        path: tt/build/dist/macosx-x86-app/
    - name: Download Mac arm64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: mac-arm64
        path: tt/build/dist/macosx-arm64/
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: linux-package
        path: tt/build/dist/linux/
    - name: Upload to steam
      uses: game-ci/steam-deploy@v3
      with:
        username: ${{ vars.STEAM_USER }}
        configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
        appId: ${{ vars.STEAM_APP_ID }}
        buildDescription: v1.2.3
        firstDepotIdOverride: 3945722
        rootPath: tt/build/dist/
        depot1Path: windows
        depot2Path: macosx-arm64
        depot3Path: macosx-x86-app
        depot4Path: linux
        releaseBranch: prerelease
