name: Deploy Server (test)

# Deploys a released server build to the TEST box and restarts it.
#
# Pick a release tag; the exact server zip attached to that GitHub Release is
# downloaded (the same artifact published to players) and shipped -- no separate
# build. Prod is deployed the same way from promote-release.yml.
#
# Runs under the 'release' environment guard. Test-box SSH details:
#   vars: DEPLOY_HOST_TEST, DEPLOY_USER_TEST   secret: DEPLOY_SSH_KEY_TEST

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v2.0.14-103)'
        required: true
        type: string

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}  # deploy.sh + unit files as they were at the tag

      - name: Verify release and download server build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release '$TAG' not found. List with: gh release list --repo $GITHUB_REPOSITORY"
            exit 1
          fi
          mkdir -p download
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir download \
            --pattern 'tribal-trouble-server_*.zip'
          ls -lh download/

      - name: Bundle server build and deploy scripts
        run: |
          mkdir -p incoming
          unzip -q download/tribal-trouble-server_*.zip -d incoming/dist
          cp server/deploy/deploy.sh incoming/
          cp server/deploy/matchmaker.service server/deploy/router.service incoming/
          chmod +x incoming/deploy.sh

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_TEST }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ vars.DEPLOY_HOST_TEST }}" >> ~/.ssh/known_hosts

      - name: Copy files to the test server
        run: |
          TARGET="${{ vars.DEPLOY_USER_TEST }}@${{ vars.DEPLOY_HOST_TEST }}"
          ssh "$TARGET" 'rm -rf ~/incoming && mkdir -p ~/incoming'
          rsync -a --delay-updates incoming/ "$TARGET:incoming/"

      - name: Deploy and restart the server
        run: |
          ssh "${{ vars.DEPLOY_USER_TEST }}@${{ vars.DEPLOY_HOST_TEST }}" \
            "bash ~/incoming/deploy.sh '${{ inputs.tag }}'"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Test server deploy: ${{ inputs.tag }}"
            echo ""
            echo "- host: \`${{ vars.DEPLOY_HOST_TEST }}\`"
            echo "- matchmaker (:33214) + router (:11221) restarted and health-checked"
            echo "- auto-rolls-back to the previous release on health-check failure"
          } >> "$GITHUB_STEP_SUMMARY"
